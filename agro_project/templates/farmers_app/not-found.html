<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found - AGRO</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="navbar-container"></div>
  
  <div style="min-height: calc(100vh - 4rem); width: 100%; display: flex; align-items: center; justify-content: center; padding: 1rem; background-color: hsl(var(--background));">
    <div class="card" style="width: 100%; max-width: 28rem; margin: 0 auto;">
      <div class="card-content" style="padding-top: 1.5rem; text-align: center;">
        <div style="display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; gap: 0.5rem;">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: hsl(var(--destructive));">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <h1 style="font-size: 1.5rem; font-weight: bold;">404 Page Not Found</h1>
        </div>

        <p style="margin-top: 1rem; font-size: 0.875rem; color: hsl(var(--muted-foreground));">
          The page you're looking for doesn't exist.
        </p>
        
        <div style="margin-top: 2rem;">
          <a href="index.html">
            <button class="btn">Go to Home</button>
          </a>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>
  <div id="cart-sheet-container"></div>

  <script src="../js/app.js"></script>
  <script src="../js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('navbar-container').innerHTML = renderNavbar();
      document.getElementById('footer-container').innerHTML = renderFooter();
      document.getElementById('cart-sheet-container').innerHTML = renderCartSheet();
      
      if (window.AppState) {
        AppState.init();
        AppState.updateAuthUI();
        AppState.updateCartUI();
      }
    });
  </script>
</body>
</html>
